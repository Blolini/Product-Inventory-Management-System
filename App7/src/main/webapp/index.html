<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
   <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        a {
            display: block;
            text-decoration: none;
            background: #ff7e5f;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover {
            background: #e85c41;
        }
    </style>

    <script>
        function handleClick(action) {
            console.log(action + " clicked");
        }
    </script>

</head>

<body>

<div class="container">

    <h1>Here are the Products</h1>

    <a href="add.html" onclick="handleClick('Add Product')">
        Add Product Details
    </a>

    <a href="view" onclick="handleClick('View Products')">
        View Product Details
    </a>

</div>
</body>
</html>
