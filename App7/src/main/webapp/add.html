<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

   <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #43cea2, #185a9d);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #43cea2;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #2bbf8a;
        }

        .error {
            color: red;
            font-size: 12px;
            display: none;
        }
    </style>

    <script>
        function validateForm() {
            let valid = true;

            let price = document.forms["productForm"]["pprice"].value;
            let quantity = document.forms["productForm"]["pquantity"].value;

            if (isNaN(price) || price <= 0) {
                alert("Enter valid price");
                valid = false;
            }

            if (isNaN(quantity) || quantity <= 0) {
                alert("Enter valid quantity");
                valid = false;
            }

            return valid;
        }
    </script>

</head>

<body>

<div class="form-container">

    <h1><u>Product Details</u></h1>

    <form name="productForm" action="fs" method="post" onsubmit="return validateForm()">

        <label>Product Code</label>
        <input type="text" name="pcode" required>

        <label>Product Name</label>
        <input type="text" name="pname" required>

        <label>Product Company</label>
        <input type="text" name="pcompany" required>

        <label>Product Price</label>
        <input type="text" name="pprice" required>

        <label>Product Quantity</label>
        <input type="text" name="pquantity" required>

        <input type="submit" value="Add Product">

    </form>

</div>



</body>
</html>
